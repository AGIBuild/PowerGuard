name: release-msi

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/PowerGuard.sln

      - name: Verify formatting
        run: dotnet format src/PowerGuard.sln --verify-no-changes --no-restore

      - name: Build with warnings as errors
        run: dotnet build src/PowerGuard.sln -c Release --no-restore -warnaserror

      - name: Require and run unit tests
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path . -Recurse -Filter "*Tests.csproj" | Select-Object -ExpandProperty FullName
          if (-not $testProjects) {
            throw "No *Tests.csproj found. Automated tests are required before release packaging."
          }

          foreach ($project in $testProjects) {
            dotnet test $project -c Release --no-build --verbosity normal
          }

  build-and-release:
    runs-on: windows-latest
    needs: quality-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Parse version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $releaseVersion = $tag.TrimStart('v')
          $productVersion = ([regex]::Match($releaseVersion, '^\d+\.\d+\.\d+')).Value

          if ([string]::IsNullOrWhiteSpace($productVersion)) {
            throw "Tag '$tag' is invalid. Use format vMAJOR.MINOR.PATCH (for example: v1.2.3)."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "product_version=$productVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore src/PowerGuard.csproj

      - name: Publish single-file app
        shell: pwsh
        run: |
          dotnet publish src/PowerGuard.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:Version="${{ steps.version.outputs.product_version }}" `
            -o artifacts/publish

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        run: |
          $msiName = "PowerGuard-${{ steps.version.outputs.release_version }}-x64.msi"
          wix build tools/installer/PowerGuard.wxs `
            -arch x64 `
            -d PublishDir="$pwd\artifacts\publish" `
            -d ProductVersion="${{ steps.version.outputs.product_version }}" `
            -o "artifacts\$msiName"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.msi