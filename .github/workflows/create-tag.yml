name: create-tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version (for example: 0.1.2 or v0.1.2). Leave empty to auto-increment patch version."
        required: false
        default: ""
        type: string
      ref:
        description: "Git ref to tag (branch or commit SHA)"
        required: false
        default: "main"
        type: string

permissions:
  actions: write
  contents: write

jobs:
  create-and-push-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch all tags
        shell: bash
        run: git fetch --tags --force origin

      - name: Resolve and validate tag
        id: tag
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          INPUT_VERSION="${INPUT_VERSION// /}"

          if [[ -z "$INPUT_VERSION" ]]; then
            LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)

            if [[ -z "$LATEST_TAG" ]]; then
              TAG="v0.1.0"
            else
              VERSION_PART="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_PART"
              NEXT_PATCH=$((PATCH + 1))
              TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
            fi
          else
            if [[ "$INPUT_VERSION" == v* ]]; then
              TAG="$INPUT_VERSION"
            else
              TAG="v$INPUT_VERSION"
            fi
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $TAG"
            echo "Use vMAJOR.MINOR.PATCH (for example: v1.2.3)."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists locally: $TAG"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on remote: $TAG"
            exit 1
          fi

      - name: Create and push tag
        id: push_tag
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-msi.yml',
              ref: 'main',
              inputs: {
                tag: '${{ steps.push_tag.outputs.tag }}'
              }
            });
